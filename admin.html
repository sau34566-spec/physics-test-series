 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Physics Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #f43f5e; --bg: #030712; --card: rgba(17, 24, 39, 0.8); --text: #f9fafb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 40px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .controls { display: flex; gap: 15px; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-refresh { background: var(--primary); color: white; }
        .btn-wipe { background: rgba(244, 63, 94, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .table-container { background: var(--card); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(255,255,255,0.05); padding: 15px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .stat-badge { padding: 4px 10px; border-radius: 6px; font-weight: 700; background: rgba(99,102,241,0.15); color: var(--primary); }
        .date-text { font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Admin Panel</h1>
                <p style="opacity: 0.6; font-size: 0.9rem;">Real-time Student Performance Tracking</p>
            </div>
            <div class="controls">
                <button class="btn btn-refresh" onclick="refreshData()">Refresh Real-time</button>
                <button class="btn btn-wipe" onclick="wipeRecords()">Wipe All Records</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Email</th>
                        <th>Score</th>
                        <th>Doubt / Query</th>
                        <th>Submission Date</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <tr><td colspan="5" style="text-align:center;">Initializing connection...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, query, getDocs, deleteDoc, doc, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8XeHrqnYP1FEpwpqUZEdKsVAJGDw2r7o",
            authDomain: "physics-test-series-405c7.firebaseapp.com",
            projectId: "physics-test-series-405c7",
            storageBucket: "physics-test-series-405c7.firebasestorage.app",
            messagingSenderId: "758620061190",
            appId: "1:758620061190:web:dbbc7759c95b5e7d8b8d87"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // REAL-TIME REFRESH LOGIC (onSnapshot automatically updates the UI)
        function listenToResults() {
            const q = query(collection(db, "results"), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const tableBody = document.getElementById('results-body');
                tableBody.innerHTML = "";
                
                if (snapshot.empty) {
                    tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No records found.</td></tr>";
                    return;
                }

                snapshot.forEach((res) => {
                    const data = res.data();
                    const date = data.timestamp ? data.timestamp.toDate().toLocaleString('en-IN') : "Just now";
                    
                    tableBody.innerHTML += `
                        <tr>
                            <td style="font-weight:600;">${data.name}</td>
                            <td style="opacity:0.8;">${data.email}</td>
                            <td><span class="stat-badge">${data.score}</span></td>
                            <td style="max-width:250px; font-style:italic; color:#cbd5e1;">${data.doubt}</td>
                            <td class="date-text">${date}</td>
                        </tr>
                    `;
                });
            });
        }

        // Manual Refresh Button Logic
        window.refreshData = () => {
            const btn = document.querySelector('.btn-refresh');
            btn.innerText = "Syncing...";
            setTimeout(() => { 
                btn.innerText = "Refresh Real-time"; 
                // onSnapshot handles the data, so we just give visual feedback
            }, 1000);
        };

        // Wipe Records Logic
        window.wipeRecords = async () => {
            if(!confirm("Are you sure? This will delete ALL student results permanently!")) return;
            const q = query(collection(db, "results"));
            const snap = await getDocs(q);
            const deletePromises = snap.docs.map(d => deleteDoc(doc(db, "results", d.id)));
            await Promise.all(deletePromises);
            alert("Database cleared.");
        };

        // Start listening when page loads
        listenToResults();
    </script>
</body>
</html>
