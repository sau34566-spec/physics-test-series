 <!-- ================= FIREBASE CONSOLE INTEGRATION SCRIPT ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8XeHrqnYP1FEpwpqUZEdKsVAJGDw2r7o",
            authDomain: "physics-test-series-405c7.firebaseapp.com",
            projectId: "physics-test-series-405c7",
            storageBucket: "physics-test-series-405c7.firebasestorage.app",
            messagingSenderId: "758620061190",
            appId: "1:758620061190:web:dbbc7759c95b5e7d8b8d87"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allStudentResults = [];

        // SLIDE SWITCHER ENGINE LOGIC
        window.switchSlide = function(slideNumber) {
            document.querySelectorAll('.admin-slide-content').forEach(slide => slide.classList.remove('active'));
            document.querySelectorAll('.slide-tab-btn').forEach(btn => btn.classList.remove('active'));

            const targetSlide = document.getElementById(`slide-${slideNumber}-content`);
            if (targetSlide) targetSlide.classList.add('active');
            
            if (window.event && window.event.currentTarget) {
                window.event.currentTarget.classList.add('active');
            }
        };

        window.toggleUploadUI = function() {
            const selectedRadio = document.querySelector('input[name="upload-mode"]:checked');
            if (!selectedRadio) return;
            
            const currentMode = selectedRadio.value;
            document.getElementById('mode-form-view').style.display = 'none';
            document.getElementById('mode-code-view').style.display = 'none';
            document.getElementById('mode-msword-view').style.display = 'none';

            if(currentMode === 'form') document.getElementById('mode-form-view').style.display = 'block';
            else if(currentMode === 'code') document.getElementById('mode-code-view').style.display = 'block';
            else if(currentMode === 'msword') document.getElementById('mode-msword-view').style.display = 'block';
        };

        // LOAD SETTINGS
        async function loadExamSettings() {
            try {
                const docRef = doc(db, "exam_config", "current_test");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('config-total-pool').value = data.totalPool || "";
                    document.getElementById('config-student-limit').value = data.studentLimit || "";
                    if(data.uploadMode) {
                        const targetRadio = document.querySelector(`input[name="upload-mode"][value="${data.uploadMode}"]`);
                        if(targetRadio) {
                            targetRadio.checked = true;
                            window.toggleUploadUI();
                        }
                    }
                }
            } catch (e) {
                console.error("Configuration loading error: ", e);
            }
        }

        // SAVE CONFIGURATIONS
        window.saveExamSettings = async function() {
            const totalPoolInput = document.getElementById('config-total-pool').value;
            const studentLimitInput = document.getElementById('config-student-limit').value;
            
            const totalPool = parseInt(totalPoolInput, 10);
            const studentLimit = parseInt(studentLimitInput, 10);
            
            const selectedRadio = document.querySelector('input[name="upload-mode"]:checked');
            const uploadMode = selectedRadio ? selectedRadio.value : 'form';

            if (isNaN(totalPool) || isNaN(studentLimit)) {
                alert("Please fill both input boxes with valid numbers.");
                return;
            }
            if (studentLimit > totalPool) {
                alert("Error: Student limit cannot be greater than total pool size.");
                return;
            }

            const saveBtn = document.getElementById('save-config-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "Applying Configurations...";

            try {
                await setDoc(doc(db, "exam_config", "current_test"), {
                    totalPool: totalPool,
                    studentLimit: studentLimit,
                    uploadMode: uploadMode,
                    updatedAt: new Date()
                });
                alert("Success: Configuration saved securely to database.");
            } catch (error) {
                alert("Database save failed: " + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Save & Apply Configurations";
            }
        };

        // UPLOAD SINGLE QUESTION
        window.uploadSingleQuestion = async function(e) {
            if (e && e.preventDefault) e.preventDefault();
            
            const qBtn = document.getElementById('upload-q-btn');
            qBtn.disabled = true;
            qBtn.innerText = "Uploading data...";

            const questionStr = document.getElementById('question-text').value.trim();
            const optionsArr = [
                document.getElementById('opt-0').value.trim(),
                document.getElementById('opt-1').value.trim(),
                document.getElementById('opt-2').value.trim(),
                document.getElementById('opt-3').value.trim()
            ];
            const correctAnsStr = document.getElementById('correct-answer').value.trim();

            if(!optionsArr.includes(correctAnsStr)) {
                alert("Warning: Correct answer text must perfectly match one of the four options.");
                qBtn.disabled = false;
                qBtn.innerText = "Upload Question to Cloud";
                return;
            }

            try {
                await addDoc(collection(db, "questions"), {
                    q: questionStr,
                    options: optionsArr,
                    a: correctAnsStr,
                    timestamp: new Date()
                });
                alert("Question added to cloud database successfully.");
                document.getElementById('question-upload-form').reset();
            } catch (err) {
                alert("Upload failed: " + err.message);
            } finally {
                qBtn.disabled = false;
                qBtn.innerText = "Upload Question to Cloud";
            }
        };

        // REAL-TIME SECURITY AND LEADERBOARD DATA STREAM
        function listenToLiveDatabaseRecords() {
            const analyticsBody = document.getElementById('analytics-table-body');
            const leaderboardBody = document.getElementById('leaderboard-table-body');

            onSnapshot(collection(db, "results"), (snap) => {
                allStudentResults = [];

                snap.forEach((docItem) => {
                    const r = docItem.data();
                    let absoluteScore = 0;
                    
                    if (r.score && typeof r.score === 'string') {
                        absoluteScore = parseFloat(r.score.split('/')[0]) || 0;
                    } else if (typeof r.score === 'number') {
                        absoluteScore = r.score;
                    }

                    // Epoch fallback parsing for missing timestamps
                    let submissionTime = new Date(0); 
                    if (r.timestamp) {
                        if (typeof r.timestamp.toDate === 'function') {
                            submissionTime = r.timestamp.toDate();
                        } else {
                            submissionTime = new Date(r.timestamp);
                        }
                    }

                    allStudentResults.push({
                        id: docItem.id,
                        name: r.name || "Anonymous",
                        email: r.email || "No Email",
                        scoreText: r.score || "0/0",
                        scoreVal: absoluteScore,
                        tabSwitches: typeof r.tabSwitches !== 'undefined' ? parseInt(r.tabSwitches, 10) : 0,
                        copiesAttempted: typeof r.copiesAttempted !== 'undefined' ? parseInt(r.copiesAttempted, 10) : 0,
                        refreshes: typeof r.refreshes !== 'undefined' ? parseInt(r.refreshes, 10) : 0,
                        feedback: r.feedback || "None",
                        rating: r.rating || 0,
                        doubt: r.doubt || "None",
                        timestamp: submissionTime
                    });
                });

                // 1. Render Live Analytics Panel (Sorted by Last Submitted -> Top)
                const securitySorted = [...allStudentResults].sort((a, b) => b.timestamp - a.timestamp);
                
                analyticsBody.innerHTML = '';
                if(securitySorted.length === 0) {
                    analyticsBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No student submission data available yet.</td></tr>`;
                } else {
                    securitySorted.forEach(r => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong>${r.name}</strong><br><span style="font-size:0.8rem; color:var(--text-muted)">${r.email}</span></td>
                            <td><span class="alert-indicator ${r.tabSwitches > 0 ? 'alert-warn' : 'alert-safe'}"><i class="fa-solid fa-window-restore"></i> ${r.tabSwitches} Times</span></td>
                            <td><span class="alert-indicator ${r.copiesAttempted > 0 ? 'alert-warn' : 'alert-safe'}"><i class="fa-solid fa-copy"></i> ${r.copiesAttempted} Times</span></td>
                            <td><span class="alert-indicator ${r.refreshes > 0 ? 'alert-warn' : 'alert-safe'}"><i class="fa-solid fa-rotate"></i> ${r.refreshes} Times</span></td>
                            <td><div style="max-width:200px; font-size:0.85rem; max-height:60px; overflow-y:auto;">${r.doubt}</div></td>
                        `;
                        analyticsBody.appendChild(tr);
                    });
                }

                // 2. Render Leaderboard Panel (Sorted by Highest Score)
                const leaderboardSorted = [...allStudentResults].sort((a, b) => b.scoreVal - a.scoreVal);
                
                leaderboardBody.innerHTML = '';
                if(leaderboardSorted.length === 0) {
                    leaderboardBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No logs registered inside the leaderboard.</td></tr>`;
                } else {
                    leaderboardSorted.forEach((r, idx) => {
                        const tr = document.createElement('tr');
                        let starUi = '';
                        for(let i=1; i<=5; i++) {
                            starUi += `<i class="fa-solid fa-star" style="color: ${i <= r.rating ? 'var(--accent)' : '#cbd5e1'}"></i>`;
                        }

                        tr.innerHTML = `
                            <td><span class="badge-rank">#${idx + 1}</span></td>
                            <td><strong>${r.name}</strong><br><span style="font-size:0.8rem; color:var(--text-muted)">${r.email}</span></td>
                            <td><span style="font-weight:700; color:var(--primary-light)">${r.scoreText}</span></td>
                            <td><div>${starUi}</div></td>
                            <td><span style="font-size:0.85rem; color:var(--text-main)">${r.feedback}</span></td>
                        `;
                        leaderboardBody.appendChild(tr);
                    });
                }
            }, (err) => {
                console.error("Live listener connection failed: ", err);
                analyticsBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--danger);">Failed to sync live datasets.</td></tr>`;
                leaderboardBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--danger);">Failed to load leaderboard datasets.</td></tr>`;
            });
        }

        // CSV GENERATION
        window.downloadResultsCSV = function() {
            if(allStudentResults.length === 0) {
                alert("No student data rows available to generate CSV spreadsheet reports.");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Rank,Student Name,Email,Score,Tab Switches,Copy Violations,Page Refreshes,Doubt Asked,Feedback,Rating Stars\n";

            const exportData = [...allStudentResults].sort((a, b) => b.scoreVal - a.scoreVal);

            exportData.forEach((r, idx) => {
                const escapedFeedback = r.feedback.replace(/,/g, " ");
                const escapedName = r.name.replace(/,/g, " ");
                const escapedDoubt = r.doubt.replace(/,/g, " ");
                csvContent += `${idx + 1},${escapedName},${r.email},${r.scoreText},${r.tabSwitches},${r.copiesAttempted},${r.refreshes},${escapedDoubt},${escapedFeedback},${r.rating}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const element = document.createElement("a");
            element.setAttribute("href", encodedUri);
            element.setAttribute("download", `Exam_Complete_Report_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        };

        // PURGE LOGS
        window.clearAllResults = async function() {
            if(!confirm("Are you entirely sure you want to permanently delete all student submission records? This cannot be undone!")) return;
            
            const clearBtn = document.getElementById('clear-results-btn');
            clearBtn.disabled = true;
            clearBtn.innerText = "Purging Database Logs...";

            try {
                const snap = await getDocs(collection(db, "results"));
                const promises = [];
                snap.forEach((documentItem) => {
                    promises.push(deleteDoc(doc(db, "results", documentItem.id)));
                });
                await Promise.all(promises);
                alert("All record datasets deleted from the database securely.");
            } catch (err) {
                alert("Purge error encountered: " + err.message);
            } finally {
                clearBtn.disabled = false;
                clearBtn.innerText = "Clear All Database Results";
            }
        };

        // INITIALIZATION CALL
        window.addEventListener('DOMContentLoaded', () => {
            loadExamSettings();
            listenToLiveDatabaseRecords();
        });
    </script>
