 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Physics Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .dashboard { max-width: 1200px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: var(--primary); color: white; }
        .star-box { color: #f59e0b; font-weight: bold; } /* Stars color */
        #login-screen { text-align: center; margin-top: 100px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; width: 250px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Admin Access</h2>
    <input type="password" id="adminPass" placeholder="Enter Password"> <br>
    <button onclick="checkPass()">Login</button>
</div>

<div class="dashboard" id="main-dashboard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Student Reports</h1>
        <button onclick="location.reload()">Refresh Data</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Score</th>
                <th>Rating</th> <th>Feedback</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="results-table"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA8XeHrqnYP1FEpwpqUZEdKsVAJGDw2r7o",
        authDomain: "physics-test-series-405c7.firebaseapp.com",
        projectId: "physics-test-series-405c7",
        storageBucket: "physics-test-series-405c7.firebasestorage.app",
        messagingSenderId: "758620061190",
        appId: "1:758620061190:web:dbbc7759c95b5e7d8b8d87"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    window.checkPass = () => {
        if(document.getElementById('adminPass').value === "physics123") {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('main-dashboard').style.display = "block";
            loadData();
        } else { alert("Wrong Password!"); }
    };

    async function loadData() {
        const table = document.getElementById('results-table');
        const q = query(collection(db, "results"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        table.innerHTML = "";

        snap.forEach((doc) => {
            const d = doc.data();
            const rating = d.rating || "N/A"; // Firebase se rating uthana
            const date = d.timestamp ? d.timestamp.toDate().toLocaleString() : "N/A";
            
            table.innerHTML += `
                <tr>
                    <td>${d.name}</td>
                    <td>${d.email}</td>
                    <td><b>${d.score}</b></td>
                    <td class="star-box">${rating}</td>
                    <td>${d.feedback}</td>
                    <td style="font-size:0.8rem;">${date}</td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
