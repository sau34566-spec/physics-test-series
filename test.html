 <!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Test</title>
    <!-- Google Fonts aur FontAwesome Icons aapke website ki design match karne ke liye -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e3a8a;
            --bg-dark: #0f172a;
            --bg-card: #ffffff;
            --text-main: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* SECURITY: Text Selection Block Karna */
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .test-container {
            background: var(--bg-card);
            width: 100%;
            max-width: 650px;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        p {
            color: #64748b;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="test-container">
        <h1><i class="fa-solid fa-flask-vial"></i> Physics Test Started!</h1>
        <p>Your environment is securely locked. Do not attempt to switch tabs or copy content.</p>
        <!-- Aapka baaki questions ka code ya portal content yahan aayega -->
    </div>

    <!-- SECURITY JAVASCRIPT ENGINE -->
    <script>
        // 1. Right-Click Menu Block
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Copy aur Paste Command Disabled
        document.addEventListener('copy', (e) => {
            e.preventDefault();
            alert("Security Alert: Copying test contents is prohibited!");
        });
        document.addEventListener('paste', (e) => {
            e.preventDefault();
            alert("Security Alert: Pasting functions are locked!");
        });

        // 3. Tab Switching Detection
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) {
                alert("CRITICAL WARNING: Tab switching detected! This incident has been logged in the system portal.");
            }
        });

        // 4. Keyboard Shortcuts Disable (Print, DevTools, Inspect)
        document.addEventListener("keydown", function(e) {
            // Ctrl+P (Print Screen / PDF download shortcut block)
            if (e.ctrlKey && (e.key === 'p' || e.keyCode === 80)) {
                e.preventDefault();
                alert("Security Action: Page rendering to print is blocked.");
            }
            // F12 key (Inspect Element shortcut block)
            if (e.key === "F12" || e.keyCode === 123) {
                e.preventDefault();
                alert("Security Action: Developer settings access denied.");
            }
            // Ctrl + Shift + I (Inspect Panel alternative lock)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.keyCode === 73)) {
                e.preventDefault();
                alert("Security Action: Debugging tools are offline.");
            }
            // Clear clipboard buffer on PrintScreen button trigger
            if (e.key === "PrintScreen") {
                navigator.clipboard.writeText("");
                alert("Screenshots are restricted on this exam page!");
            }
        });
    </script>
</body>
</html>
