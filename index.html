 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Elite | Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text); display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .login-box { 
            background: var(--card); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 28px; width: 100%; max-width: 400px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; 
            background: rgba(15, 23, 42, 0.8); color: white; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3); }

        button { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 600;
            font-size: 1rem; margin-top: 15px; transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        button:disabled { background: #475569; cursor: not-allowed; }

        #status-msg { margin-top: 20px; font-size: 0.9rem; font-weight: 400; }
        .err { color: #ef4444; }
        .ok { color: #22c55e; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 style="margin-bottom:5px;">Physics Elite Portal</h2>
    <p style="color:#94a3b8; font-size:0.85rem; margin-bottom:25px;">Enter details to unlock your test session</p>

    <input type="text" id="name" placeholder="Your Full Name">
    <input type="email" id="email" placeholder="student@example.com">

    <button id="entryBtn">Start Examination</button>
    <div id="status-msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA8XeHrqnYP1FEpwpqUZEdKsVAJGDw2r7o",
        authDomain: "physics-test-series-405c7.firebaseapp.com",
        projectId: "physics-test-series-405c7",
        storageBucket: "physics-test-series-405c7.firebasestorage.app",
        messagingSenderId: "758620061190",
        appId: "1:758620061190:web:dbbc7759c95b5e7d8b8d87"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const btn = document.getElementById('entryBtn');
    const msg = document.getElementById('status-msg');

    btn.addEventListener('click', async () => {
        const nameVal = document.getElementById('name').value.trim();
        const emailVal = document.getElementById('email').value.trim().toLowerCase();

        if (!nameVal || !emailVal) {
            msg.innerHTML = '<span class="err">⚠️ Please enter both Name and Email.</span>';
            return;
        }

        btn.disabled = true;
        msg.innerHTML = 'Verifying credentials...';

        try {
            // Smart Check: Searching Firebase for this email
            const q = query(collection(db, "results"), where("email", "==", emailVal));
            const snap = await getDocs(q);

            if (!snap.empty) {
                msg.innerHTML = '<span class="err">❌ Access Denied: You have already completed this test.</span>';
                btn.disabled = false;
            } else {
                localStorage.setItem('currentUser', nameVal);
                localStorage.setItem('currentEmail', emailVal);
                msg.innerHTML = '<span class="ok">✅ Identity Verified! Preparing test...</span>';
                
                setTimeout(() => {
                    window.location.href = 'chapter1.html';
                }, 1200);
            }
        } catch (error) {
            msg.innerHTML = '<span class="err">Network Error. Check your connection.</span>';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
