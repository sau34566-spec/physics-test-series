 <!-- Main Container (Slide 1) -->
<div style="
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    background: radial-gradient(circle at center, #1e293b, #0f172a); 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    padding: 20px;
">
    <!-- Professional Glassmorphism Card -->
    <div style="
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 40px 32px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        text-align: center;
    ">
        <!-- Logo / Title Header -->
        <h2 style="
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        ">Physics Elite</h2>
        
        <p style="
            color: #94a3b8;
            font-size: 14px;
            margin: 0 0 32px 0;
            font-weight: 400;
        ">Enter your details to begin the test series</p>

        <!-- Form Fields -->
        <form id="login-form" style="text-align: left;">
            
            <!-- Input 1: Full Name -->
            <div style="margin-bottom: 20px;">
                <label for="name" style="
                    display: block;
                    color: #cbd5e1;
                    font-size: 13px;
                    font-weight: 500;
                    margin-bottom: 8px;
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                ">Full Name</label>
                <input type="text" id="name" placeholder="e.g. John Doe" required style="
                    width: 100%;
                    padding: 12px 16px;
                    background: rgba(15, 23, 42, 0.6);
                    border: 1px solid rgba(255, 255, 255, 0.1);
                    border-radius: 8px;
                    color: #ffffff;
                    font-size: 15px;
                    box-sizing: border-box;
                    transition: all 0.3s ease;
                    outline: none;
                " onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59, 130, 246, 0.15)'" 
                   onblur="this.style.borderColor='rgba(255, 255, 255, 0.1)'; this.style.boxShadow='none'">
            </div>

            <!-- Input 2: Gmail Address -->
            <div style="margin-bottom: 32px;">
                <label for="email" style="
                    display: block;
                    color: #cbd5e1;
                    font-size: 13px;
                    font-weight: 500;
                    margin-bottom: 8px;
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                ">Gmail Address</label>
                <input type="email" id="email" placeholder="example@gmail.com" required style="
                    width: 100%;
                    padding: 12px 16px;
                    background: rgba(15, 23, 42, 0.6);
                    border: 1px solid rgba(255, 255, 255, 0.1);
                    border-radius: 8px;
                    color: #ffffff;
                    font-size: 15px;
                    box-sizing: border-box;
                    transition: all 0.3s ease;
                    outline: none;
                " onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59, 130, 246, 0.15)'" 
                   onblur="this.style.borderColor='rgba(255, 255, 255, 0.1)'; this.style.boxShadow='none'">
            </div>

            <!-- Professional CTA Button -->
            <button type="submit" style="
                width: 100%;
                padding: 14px;
                background: #2563eb;
                color: #ffffff;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            " onmouseover="this.style.background='#1d4ed8'; this.style.transform='translateY(-1px)'" 
               onmouseout="this.style.background='#2563eb'; this.style.transform='translateY(0)'">
                START TEST
            </button>
            
        </form>
    </div>
</div>
