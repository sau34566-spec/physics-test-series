<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Elite | Test Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(244, 63, 94, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            height: 4px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.4s ease;
        }

        .master-box {
            background: var(--card);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 700px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .welcome-text {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(to right, #fff, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
            margin-bottom: 15px;
        }
        input:focus, textarea:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.5); }

        .btn-main {
            width: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(79, 70, 229, 0.6); }

        .btn-sub {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            flex: 1;
        }
        .btn-review.active { background: var(--warning); color: black; border-color: var(--warning); }

        .timer-circle {
            width: 75px; height: 75px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) var(--p), rgba(255,255,255,0.1) 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            position: relative;
            --p: 100%;
        }
        .timer-circle::after {
            content: attr(data-time);
            position: absolute;
            width: 63px; height: 63px;
            background: #0b1120;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.2rem;
        }

        .option {
            background: rgba(255, 255, 255, 0.03);
            padding: 18px;
            margin: 10px 0;
            border-radius: 14px;
            cursor: pointer;
            text-align: left;
            border: 1.5px solid transparent;
            transition: 0.2s;
        }
        .option.selected { background: rgba(99, 102, 241, 0.15); border-color: var(--primary); }

        #review-container { text-align: left; margin-top: 20px; max-height: 300px; overflow-y: auto; padding-right: 8px; margin-bottom: 20px;}
        .review-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 12px;
            border-left: 4px solid #374151;
        }
        .stat-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="progress-container"><div id="progress-bar"></div></div>

    <div class="master-box">
        <div id="login-ui">
            <h1 class="welcome-text">Physics Elite</h1>
            <input type="text" id="stdName" placeholder="Full Name">
            <input type="email" id="stdEmail" placeholder="Gmail Address (@gmail.com)">
            <button class="btn-main" onclick="verifyUser()">Start Test</button>
            <p id="msg" style="margin-top:15px; color: var(--error); font-weight: 600;"></p>
        </div>

        <div id="instruct-ui" style="display:none;">
            <h2 style="font-family: 'Outfit'; margin-bottom: 20px;">Guidelines</h2>
            <div style="text-align:left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 14px; margin-bottom: 25px; font-size: 0.9rem; line-height: 1.6;">
                <p>• ⏱️ 60s per question.</p>
                <p>• ❌ Negative marking (-0.25).</p>
                <p>• 🚫 Switching tabs auto-submits.</p>
            </div>
            <button class="btn-main" onclick="fetchQuestions()">I'm Ready</button>
        </div>

        <div id="quiz-ui" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="font-size: 0.75rem; font-weight: 700; color: var(--primary);">MODULE: ELECTROSTATICS</span>
                <span id="q-counter" style="font-size: 0.75rem; opacity: 0.7;"></span>
            </div>
            <div class="timer-circle" id="timer-circ" data-time="60"></div>
            <div id="q-box"></div>
            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button class="btn-sub btn-review" id="reviewBtn" onclick="toggleReview()">🔖 Review</button>
                <button class="btn-sub" onclick="changeQuestion(1)">Skip</button>
                <button class="btn-main" style="flex:2;" onclick="submitAndNext()">Confirm Answer</button>
            </div>
        </div>

        <div id="result-ui" style="display:none;">
            <h2 style="font-family: 'Outfit';">Performance Summary</h2>
            <div id="final-score" style="font-size: 4rem; font-weight: 800; color: var(--primary); margin: 10px 0;"></div>
            <div id="stat-text" style="margin-bottom: 20px;"></div>
            
            <div id="review-container"></div>
            
            <textarea id="feedback-txt" rows="3" placeholder="Any doubts? Type your query here before final submission..."></textarea>
            
            <button class="btn-main" id="syncBtn" onclick="submitToFirebase()">Final Submission</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8XeHrqnYP1FEpwpqUZEdKsVAJGDw2r7o",
            authDomain: "physics-test-series-405c7.firebaseapp.com",
            projectId: "physics-test-series-405c7",
            storageBucket: "physics-test-series-405c7.firebasestorage.app",
            messagingSenderId: "758620061190",
            appId: "1:758620061190:web:dbbc7759c95b5e7d8b8d87"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let questions = [], currentQ = 0, userAnswers = [], markedReviews = [], timer, timeLeft = 60;
        let isTestRunning = false;

        window.verifyUser = async () => {
            const n = document.getElementById('stdName').value.trim();
            const e = document.getElementById('stdEmail').value.toLowerCase().trim();
            if(!n || !e) return alert("Please fill all fields.");
            if(!e.endsWith("@gmail.com")) return alert("Only @gmail.com is allowed.");

            const q = query(collection(db, "results"), where("email", "==", e));
            const snap = await getDocs(q);
            if(!snap.empty) {
                document.getElementById('msg').innerText = "Test already completed.";
            } else {
                localStorage.setItem('user', n);
                localStorage.setItem('mail', e);
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('instruct-ui').style.display = 'block';
            }
        };

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'hidden' && isTestRunning) {
                alert("Security Alert: Tab switched. Automatic submission.");
                showResults();
            }
        });

        window.fetchQuestions = async () => {
            try {
                const res = await fetch('chapter1.html');
                const text = await res.text();
                const doc = new DOMParser().parseFromString(text, 'text/html');
                questions = JSON.parse(doc.getElementById('question-data').textContent);
                userAnswers = new Array(questions.length).fill(-1);
                markedReviews = new Array(questions.length).fill(false);
                document.getElementById('instruct-ui').style.display = 'none';
                document.getElementById('quiz-ui').style.display = 'block';
                isTestRunning = true;
                renderQuestion();
            } catch(e) { alert("Error loading chapter data."); }
        };

        function renderQuestion() {
            const q = questions[currentQ];
            document.getElementById('progress-bar').style.width = ((currentQ + 1) / questions.length * 100) + '%';
            document.getElementById('q-counter').innerText = `Q ${currentQ + 1} / ${questions.length}`;
            document.getElementById('q-box').innerHTML = `<h3 style="margin-bottom: 20px;">${q.q}</h3>${q.options.map((o, i) => `<div class="option ${userAnswers[currentQ]===i?'selected':''}" onclick="selectOpt(${i})">${o}</div>`).join('')}`;
            const revBtn = document.getElementById('reviewBtn');
            markedReviews[currentQ] ? revBtn.classList.add('active') : revBtn.classList.remove('active');
            resetTimer();
        }

        window.selectOpt = (idx) => { userAnswers[currentQ] = idx; renderQuestion(); };
        window.toggleReview = () => { markedReviews[currentQ] = !markedReviews[currentQ]; document.getElementById('reviewBtn').classList.toggle('active'); };
        window.submitAndNext = () => { if(userAnswers[currentQ] === -1) return alert("Select an option."); changeQuestion(1); };

        window.changeQuestion = (step) => {
            if(currentQ === questions.length - 1 && step === 1) return showResults();
            currentQ += step;
            renderQuestion();
        };

        function resetTimer() {
            clearInterval(timer); timeLeft = 60; updateTimerUI();
            timer = setInterval(() => { timeLeft--; updateTimerUI(); if(timeLeft <= 0) changeQuestion(1); }, 1000);
        }

        function updateTimerUI() {
            const circ = document.getElementById('timer-circ');
            circ.setAttribute('data-time', timeLeft);
            circ.style.setProperty('--p', (timeLeft / 60 * 100) + '%');
        }

        function showResults() {
            isTestRunning = false; clearInterval(timer);
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            let score = 0, c = 0, w = 0, s = 0, html = "";
            questions.forEach((q, i) => {
                const ua = userAnswers[i];
                if(ua === q.a) { score += 1; c++; } else if(ua !== -1) { score -= 0.25; w++; } else { s++; }
                const color = ua===-1 ? 'var(--warning)' : (ua===q.a ? 'var(--success)' : 'var(--error)');
                html += `<div class="review-card" style="border-left-color: ${color}"><b>${i+1}. ${q.q} ${markedReviews[i]?'🔖':''}</b><small style="color: var(--text-dim)">Chosen: ${ua===-1?'Skipped':q.options[ua]} | Correct: ${q.options[q.a]}</small></div>`;
            });
            document.getElementById('final-score').innerText = score.toFixed(2);
            document.getElementById('stat-text').innerHTML = `<span class="stat-badge" style="background: rgba(16,185,129,0.15); color: var(--success);">CORRECT: ${c}</span> <span class="stat-badge" style="background: rgba(239,68,68,0.15); color: var(--error);">WRONG: ${w}</span>`;
            document.getElementById('review-container').innerHTML = html;
            window.finalVal = score;
        }

        window.submitToFirebase = async () => {
            const btn = document.getElementById('syncBtn');
            btn.innerText = "Syncing..."; btn.disabled = true;
            try {
                await addDoc(collection(db, "results"), {
                    name: localStorage.getItem('user'),
                    email: localStorage.getItem('mail'),
                    score: window.finalVal,
                    doubt: document.getElementById('feedback-txt').value || "No Doubts",
                    timestamp: serverTimestamp()
                });
                alert("Data secured!"); location.reload();
            } catch(e) { alert("Error syncing. Try again."); btn.disabled = false; btn.innerText = "Final Submission"; }
        };
    </script>
</body>
</html>
