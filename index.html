 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Elite Test Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 450px;
            text-align: center;
            position: relative;
        }

        /* Slide Animations */
        .slide {
            display: none;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .active { display: block; }

        h1 { color: var(--primary); font-weight: 600; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .chapter-card {
            background: #334155;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .chapter-card:hover { background: var(--primary); }

        #errorMsg { color: #f87171; font-size: 13px; margin-top: 5px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="slide active" id="slide1">
        <h1>Physics Portal</h1>
        <p>Best of luck for your exam!</p>
        <div style="text-align: left; background: #334155; padding: 15px; border-radius: 10px; font-size: 14px;">
            • 1 mark for each correct answer<br>
            • No negative marking<br>
            • Result at the end
        </div>
        <button onclick="nextSlide(2)" style="margin-top:20px;">Get Started</button>
    </div>

    <div class="slide" id="slide2">
        <h2>Verify Identity</h2>
        <input type="text" id="studentName" placeholder="Full Name">
        <input type="email" id="studentEmail" placeholder="Email (use Gmail/Yahoo)">
        <div id="errorMsg"></div>
        <button onclick="validateAndMove()">Enter Dashboard</button>
    </div>

    <div class="slide" id="slide3">
        <h2>Select Chapter</h2>
        <div class="chapter-card" onclick="startTest('chapter1.html')">Chapter 1: Units & Measurements</div>
        <div class="chapter-card" onclick="startTest('chapter2.html')">Chapter 2: Kinematics</div>
        <div class="chapter-card" onclick="startTest('chapter3.html')">Chapter 3: Laws of Motion</div>
    </div>
</div>

<script>
    function nextSlide(n) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        document.getElementById('slide' + n).classList.add('active');
    }

    function validateAndMove() {
        const name = document.getElementById('studentName').value;
        const email = document.getElementById('studentEmail').value;
        const err = document.getElementById('errorMsg');
        
        // Fake/Temp Email List (Sample)
        const blockedDomains = ['tempmail.com', '10minutemail.com', 'mailinator.com'];
        const domain = email.split('@')[1];

        if(name.length < 3) {
            err.innerText = "Please enter your full name.";
            return;
        }
        if(!email.includes('@') || !email.includes('.')) {
            err.innerText = "Invalid email format.";
            return;
        }
        if(blockedDomains.includes(domain)) {
            err.innerText = "Fake/Temporary emails are not allowed!";
            return;
        }
        
        // Check if already taken
        if(localStorage.getItem('done_' + email)) {
            err.innerText = "You have already attempted the test!";
            return;
        }

        localStorage.setItem('currentUser', name);
        localStorage.setItem('currentEmail', email);
        nextSlide(3);
    }

    function startTest(url) {
        window.location.href = url;
    }
</script>

</body>
</html>
