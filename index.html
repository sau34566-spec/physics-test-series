  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Portal | Physics Test</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {--primary: #6366f1; --accent: #a855f7; --bg: #0f172a; --card: rgba(15, 23, 42, 0.9); --text: #f8fafc; --success: #22c55e; --error: #ef4444; }
        body {font-family: 'Poppins', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #020617); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .master-box {background: var(--card); backdrop-filter: blur(25px); padding: 50px; border-radius: 28px; width: 100%; max-width: 800px; box-shadow: 0 0 50px rgba(99, 102, 241, 0.25); border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .welcome-text {font-family: 'Playfair Display', serif; font-size: 2.8rem; background: linear-gradient(to right, #fff, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; margin-bottom: 35px; }
        .chapter-badge {display: inline-block; background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 8px 20px; border-radius: 30px; font-size: 1rem; font-weight: 600; border: 1px solid var(--primary); margin-bottom: 25px; }
        input, textarea {width: 100%; padding: 18px; margin: 12px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(2, 6, 23, 0.6); color: white; box-sizing: border-box; font-size: 1rem; }
        .btn-main {width: 100%; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; padding: 18px; border-radius: 14px; cursor: pointer; font-weight: 600; transition: 0.3s; margin-top: 15px; font-size: 1.1rem; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
        .btn-sub {background: transparent; border: 1px solid #475569; color: #94a3b8; padding: 14px 25px; border-radius: 14px; cursor: pointer; font-size: 1rem; }
        .timer-circle {width: 80px; height: 80px; border-radius: 50%; background: conic-gradient(var(--primary) var(--p, 100%), #1e293b 0); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; position: relative; }
        .timer-circle::after {content: attr(data-time); position: absolute; width: 65px; height: 65px; background: #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; }
        .option {background: rgba(30, 41, 59, 0.5); padding: 18px; margin: 12px 0; border-radius: 14px; cursor: pointer; text-align: left; border: 1px solid transparent; transition: 0.2s; font-size: 1.05rem; }
        .option:hover { background: rgba(99, 102, 241, 0.1); border-color: var(--primary); }
        .option.selected { background: var(--primary); border-color: var(--accent); }
        #review-container {text-align: left; margin-top: 30px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .review-card {background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #334155; }
        .star-rating { display: flex; justify-content: center; gap: 15px; margin: 20px 0; direction: rtl; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 35px; color: #334155; cursor: pointer; transition: 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #facc15; }
    </style>
</head>
<body>
    <div class="master-box">
        <!-- Login UI -->
        <div id="login-ui">
            <h1 class="welcome-text">Welcome to <br> Test Portal</h1>
            <input type="text" id="stdName" placeholder="Enter Full Name">
            <input type="email" id="stdEmail" placeholder="Enter Email Address">
            <button class="btn-main" onclick="verifyUser()">Enter Portal</button>
            <p id="msg" style="margin-top:20px; color: var(--error); font-size: 1rem;"></p>
        </div>

        <!-- Instructions UI -->
        <div id="instruct-ui" style="display:none;">
            <h2 style="color:var(--primary);">Test Guidelines</h2>
            <div style="text-align:left; color:#cbd5e1; margin: 30px 0; line-height: 1.6;">
                <p>1. ⏱️ <b>60 Seconds:</b> Each question has a time limit.</p>
                <p>2. ✅ <b>Submission:</b> Clicking 'Submit' moves to the next question.</p>
                <p>3. 🚦 <b>Review:</b> Detailed analysis will be shown at the end.</p>
            </div>
            <button class="btn-main" onclick="startQuiz()">Start Chapter 1 Test</button>
        </div>

        <!-- Quiz UI -->
        <div id="quiz-ui" style="display:none;">
            <div class="chapter-badge">Chapter 1: Electrostatics</div>
            <div class="timer-circle" id="timer-circ" data-time="60"></div>
            <div id="q-box"></div>
            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button class="btn-sub" style="flex:1" onclick="nextQuestion()">Skip</button>
                <button class="btn-main" style="flex:1.5; margin-top:0;" onclick="submitAnswer()">Submit Answer</button>
            </div>
            <p id="q-counter" style="margin-top:20px; opacity:0.6;"></p>
        </div>

        <!-- Result UI -->
        <div id="result-ui" style="display:none;">
            <h2>Test Summary</h2>
            <h1 id="final-score" style="color:var(--primary); font-size: 3.5rem; margin: 10px 0;"></h1>
            <div id="review-container"></div>
            <div class="star-rating">
                <input type="radio" name="star" id="s5" value="5"><label for="s5">★</label>
                <input type="radio" name="star" id="s4" value="4"><label for="s4">★</label>
                <input type="radio" name="star" id="s3" value="3"><label for="s3">★</label>
                <input type="radio" name="star" id="s2" value="2"><label for="s2">★</label>
                <input type="radio" name="star" id="s1" value="1"><label for="s1">★</label>
            </div>
            <textarea id="feedback-txt" rows="3" placeholder="Any doubts or feedback?"></textarea>
            <button class="btn-main" id="syncBtn" onclick="saveToFirebase()">Final Submission</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyA8XeHrqnYP1FEpwpqUZEdKsVAJGDw2r7o",
            authDomain: "://firebaseapp.com",
            projectId: "physics-test-series-405c7",
            storageBucket: "physics-test-series-405c7.firebasestorage.app",
            messagingSenderId: "758620061190",
            appId: "1:758620061190:web:dbbc7759c95b5e7d8b8d87"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let questions = [], currentQ = 0, score = 0, userAnswers = [], timer, timeLeft = 60;

        // Login (No Password)
        window.verifyUser = () => {
            const name = document.getElementById('stdName').value;
            const email = document.getElementById('stdEmail').value;
            if(name.length > 2 && email.includes('@')) {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('instruct-ui').style.display = 'block';
            } else {
                document.getElementById('msg').innerText = "Please enter valid details!";
            }
        };

        // Start Quiz & Fetch Data
        window.startQuiz = async () => {
            document.getElementById('instruct-ui').style.display = 'none';
            document.getElementById('quiz-ui').style.display = 'block';
            
            const qSnap = await getDocs(collection(db, "questions"));
            qSnap.forEach(doc => questions.push({id: doc.id, ...doc.data()}));
            
            if(questions.length === 0) {
                questions = [{q: "Sample Question: SI unit of Charge?", options: ["Coulomb", "Volt", "Ampere", "Ohm"], correct: 0}];
            }
            loadQuestion();
        };

        function loadQuestion() {
            clearInterval(timer);
            timeLeft = 60;
            const q = questions[currentQ];
            document.getElementById('q-box').innerHTML = `
                <h3 style="margin-bottom:20px;">${q.q}</h3>
                ${q.options.map((opt, i) => `<div class="option" onclick="selectOption(${i})">${opt}</div>`).join('')}
            `;
            document.getElementById('q-counter').innerText = `Question ${currentQ + 1} / ${questions.length}`;
            runTimer();
        }

        window.selectOption = (idx) => {
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            document.querySelectorAll('.option')[idx].classList.add('selected');
            userAnswers[currentQ] = idx;
        };

        window.submitAnswer = () => {
            if(userAnswers[currentQ] === questions[currentQ].correct) score++;
            nextQuestion();
        };

        window.nextQuestion = () => {
            currentQ++;
            if(currentQ < questions.length) loadQuestion();
            else finishTest();
        };

        function runTimer() {
            const circ = document.getElementById('timer-circ');
            timer = setInterval(() => {
                timeLeft--;
                circ.setAttribute('data-time', timeLeft);
                circ.style.setProperty('--p', `${(timeLeft/60)*100}%`);
                if(timeLeft <= 0) nextQuestion();
            }, 1000);
        }

        function finishTest() {
            clearInterval(timer);
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            
            let reviewHtml = '';
            questions.forEach((q, i) => {
                const correct = q.correct;
                const userAns = userAnswers[i];
                reviewHtml += `
                    <div class="review-card" style="border-left-color: ${userAns === correct ? '#22c55e' : '#ef4444'}">
                        <strong>Q${i+1}: ${q.q}</strong><br>
                        <small>Correct: ${q.options[correct]} | Your Ans: ${userAns !== undefined ? q.options[userAns] : 'Skipped'}</small>
                    </div>`;
            });
            document.getElementById('review-container').innerHTML = reviewHtml;
        }

        window.saveToFirebase = async () => {
            const btn = document.getElementById('syncBtn');
            btn.innerText = "Saving...";
            try {
                await addDoc(collection(db, "results"), {
                    name: document.getElementById('stdName').value,
                    email: document.getElementById('stdEmail').value,
                    score: score,
                    total: questions.length,
                    feedback: document.getElementById('feedback-txt').value,
                    date: serverTimestamp()
                });
                alert("Test submitted successfully!");
                location.reload();
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
