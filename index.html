 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Elite | Student Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .login-card { 
            background: var(--card); backdrop-filter: blur(12px);
            padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; animation: slideUp 0.6s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { margin-bottom: 10px; font-weight: 600; letter-spacing: -1px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #818cf8; font-weight: 600; }
        input { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; 
            background: rgba(15, 23, 42, 0.6); color: white; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

        button { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600;
            font-size: 1rem; transition: 0.3s; margin-top: 10px;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; }

        #msg { margin-top: 15px; font-size: 0.85rem; min-height: 20px; }
        .error { color: #ef4444; }
        .loading { color: #6366f1; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Welcome Back!</h2>
    <p>Please verify your identity to start the test.</p>

    <div class="input-group">
        <label>FULL NAME</label>
        <input type="text" id="userName" placeholder="Enter your name">
    </div>

    <div class="input-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" id="userEmail" placeholder="example@gmail.com">
    </div>

    <button id="startBtn">Enter Dashboard</button>
    <div id="msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA8XeHrqnYP1FEpwpqUZEdKsVAJGDw2r7o",
        authDomain: "physics-test-series-405c7.firebaseapp.com",
        projectId: "physics-test-series-405c7",
        storageBucket: "physics-test-series-405c7.firebasestorage.app",
        messagingSenderId: "758620061190",
        appId: "1:758620061190:web:dbbc7759c95b5e7d8b8d87",
        measurementId: "G-Z5QVQMZ082"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const startBtn = document.getElementById('startBtn');
    const msg = document.getElementById('msg');

    startBtn.addEventListener('click', async () => {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim().toLowerCase();

        if (!name || !email) {
            msg.innerHTML = '<span class="error">Please fill all fields.</span>';
            return;
        }

        startBtn.disabled = true;
        msg.innerHTML = '<span class="loading">Checking database...</span>';

        try {
            // Check if email already exists in 'results' collection
            const q = query(collection(db, "results"), where("email", "==", email));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                msg.innerHTML = '<span class="error">You have already attempted the test! Contact Admin.</span>';
                startBtn.disabled = false;
            } else {
                // Save locally and move to test
                localStorage.setItem('currentUser', name);
                localStorage.setItem('currentEmail', email);
                msg.innerHTML = '<span style="color:#22c55e">Identity Verified! Redirecting...</span>';
                
                setTimeout(() => {
                    window.location.href = 'chapter1.html';
                }, 1500);
            }
        } catch (e) {
            console.error(e);
            msg.innerHTML = '<span class="error">Connection Error. Try again.</span>';
            startBtn.disabled = false;
        }
    });
</script>

</body>
</html>
