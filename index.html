  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Test Series | Master Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {--primary: #6366f1; --accent: #a855f7; --bg: #0f172a; --card: rgba(15, 23, 42, 0.9); --text: #f8fafc; --success: #22c55e; --error: #ef4444; --warning: #f59e0b;}
        body {font-family: 'Poppins', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #020617); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .master-box {background: var(--card); backdrop-filter: blur(25px); padding: 40px; border-radius: 28px; width: 100%; max-width: 800px; box-shadow: 0 0 50px rgba(99, 102, 241, 0.25); border: 1px solid rgba(255,255,255,0.1); text-align: center; position: relative; overflow: hidden;}
        
        .progress-container { width: 100%; background: #1e293b; height: 6px; position: absolute; top: 0; left: 0; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(to right, var(--primary), var(--accent)); transition: 0.4s; }

        .welcome-text {font-family: 'Playfair Display', serif; font-size: 2.5rem; background: linear-gradient(to right, #fff, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; margin-bottom: 30px; }
        input, textarea {width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(2, 6, 23, 0.6); color: white; box-sizing: border-box; font-size: 1rem; outline: none;}
        
        .btn-main {width: 100%; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; margin-top: 10px; font-size: 1.1rem; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); }
        .btn-sub {background: transparent; border: 1px solid #475569; color: #94a3b8; padding: 14px; border-radius: 12px; cursor: pointer; flex: 1; transition: 0.2s;}
        
        .btn-review { border-color: var(--warning); color: var(--warning); }
        .btn-review.active { background: var(--warning); color: white; }

        .timer-circle {width: 70px; height: 70px; border-radius: 50%; background: conic-gradient(var(--primary) var(--p), #1e293b 0); display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; position: relative; --p: 100%; }
        .timer-circle::after {content: attr(data-time); position: absolute; width: 55px; height: 55px; background: #0f172a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        
        .option {background: rgba(30, 41, 59, 0.5); padding: 16px; margin: 10px 0; border-radius: 12px; cursor: pointer; text-align: left; border: 1px solid transparent; transition: 0.2s; position: relative;}
        .option.selected { background: var(--primary); border-color: var(--accent); }

        #review-container {text-align: left; margin-top: 25px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .review-card {background: rgba(255,255,255,0.03); padding: 18px; border-radius: 14px; margin-bottom: 15px; border-left: 5px solid #334155; }
    </style>
</head>
<body>
    <div class="master-box">
        <div class="progress-container"><div id="progress-bar"></div></div>

        <div id="login-ui">
            <h1 class="welcome-text">Physics Test Portal</h1>
            <input type="text" id="stdName" placeholder="Full Name">
            <input type="email" id="stdEmail" placeholder="Email Address (Gmail Only)">
            <button class="btn-main" onclick="verifyUser()">Enter Portal</button>
            <p id="msg" style="margin-top:15px; color: var(--error);"></p>
        </div>

        <div id="instruct-ui" style="display:none;">
            <h2 style="color:var(--primary);">Test Guidelines</h2>
            <div style="text-align:left; color:#cbd5e1; font-size:0.95rem; line-height:1.6; margin: 20px 0;">
                <p>• ⏱️ <b>60s/Question:</b> Timer for each slide.</p>
                <p>• ❌ <b>Negative Marking:</b> -0.25 for wrong answers.</p>
                <p>• 🔖 <b>Review Later:</b> Mark questions to check later.</p>
                <p>• 🚫 <b>Anti-Cheat:</b> Switching tabs will auto-submit the test.</p>
            </div>
            <button class="btn-main" onclick="fetchQuestions()">Start Chapter 1 Test</button>
        </div>

        <div id="quiz-ui" style="display:none;">
            <div class="chapter-badge" style="margin-bottom:15px; color: var(--accent); font-weight: bold; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; display: inline-block;">Chapter 1: Electrostatics</div>
            <div class="timer-circle" id="timer-circ" data-time="60"></div>
            <div id="q-box"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-sub btn-review" id="reviewBtn" onclick="toggleReview()">Mark Review</button>
                <button class="btn-sub" onclick="changeQuestion(1)">Skip</button>
                <button class="btn-main" style="flex:2; margin-top:0;" onclick="submitAndNext()">Submit Answer</button>
            </div>
            <p id="q-counter" style="margin-top:15px; font-size: 0.8rem; opacity:0.6;"></p>
        </div>

        <div id="result-ui" style="display:none;">
            <h2>Test Summary</h2>
            <h1 id="final-score" style="color:var(--primary); font-size: 3rem; margin: 10px 0;"></h1>
            <p id="stat-text" style="margin-bottom: 20px; font-size: 0.9rem; font-weight: 500;"></p>
            <div id="review-container"></div>
            <textarea id="feedback-txt" rows="3" placeholder="Any doubts? Type here..."></textarea>
            <button class="btn-main" id="syncBtn" onclick="submitToFirebase()">Final Submission</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8XeHrqnYP1FEpwpqUZEdKsVAJGDw2r7o",
            authDomain: "physics-test-series-405c7.firebaseapp.com",
            projectId: "physics-test-series-405c7",
            storageBucket: "physics-test-series-405c7.firebasestorage.app",
            messagingSenderId: "758620061190",
            appId: "1:758620061190:web:dbbc7759c95b5e7d8b8d87"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let questions = [], currentQ = 0, userAnswers = [], markedReviews = [], timer, timeLeft = 60;
        let isTestRunning = false;

        window.verifyUser = async () => {
            const n = document.getElementById('stdName').value;
            const e = document.getElementById('stdEmail').value.toLowerCase();
            if(!n || !e) return alert("Fill all fields.");
            if(!e.endsWith("@gmail.com")) return alert("Use a valid @gmail.com address.");

            const q = query(collection(db, "results"), where("email", "==", e));
            const snap = await getDocs(q);
            if(!snap.empty) {
                document.getElementById('msg').innerText = "Already completed.";
            } else {
                localStorage.setItem('user', n);
                localStorage.setItem('mail', e);
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('instruct-ui').style.display = 'block';
            }
        };

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'hidden' && isTestRunning) {
                alert("Anti-cheat: Tab switch detected. Submitting test.");
                showResults();
            }
        });

        window.fetchQuestions = async () => {
            try {
                const res = await fetch('chapter1.html');
                const text = await res.text();
                const doc = new DOMParser().parseFromString(text, 'text/html');
                questions = JSON.parse(doc.getElementById('question-data').textContent);
                userAnswers = new Array(questions.length).fill(-1);
                markedReviews = new Array(questions.length).fill(false);
                document.getElementById('instruct-ui').style.display = 'none';
                document.getElementById('quiz-ui').style.display = 'block';
                isTestRunning = true;
                renderQuestion();
            } catch(e) { alert("Data error."); }
        };

        function renderQuestion() {
            const q = questions[currentQ];
            document.getElementById('progress-bar').style.width = ((currentQ + 1) / questions.length * 100) + '%';
            document.getElementById('q-counter').innerText = `Question ${currentQ + 1} of ${questions.length}`;
            document.getElementById('q-box').innerHTML = `<h3>${q.q}</h3>${q.options.map((o, i) => `<div class="option ${userAnswers[currentQ]===i?'selected':''}" onclick="selectOpt(${i})">${o}</div>`).join('')}`;
            const revBtn = document.getElementById('reviewBtn');
            markedReviews[currentQ] ? revBtn.classList.add('active') : revBtn.classList.remove('active');
            resetTimer();
        }

        window.selectOpt = (idx) => { userAnswers[currentQ] = idx; renderQuestion(); };
        window.toggleReview = () => { markedReviews[currentQ] = !markedReviews[currentQ]; document.getElementById('reviewBtn').classList.toggle('active'); };
        window.submitAndNext = () => { if(userAnswers[currentQ] === -1) return alert("Select an answer."); changeQuestion(1); };

        window.changeQuestion = (step) => {
            if(currentQ === questions.length - 1 && step === 1) return showResults();
            currentQ += step;
            renderQuestion();
        };

        function resetTimer() {
            clearInterval(timer); timeLeft = 60; updateTimerUI();
            timer = setInterval(() => { timeLeft--; updateTimerUI(); if(timeLeft <= 0) changeQuestion(1); }, 1000);
        }

        function updateTimerUI() {
            const circ = document.getElementById('timer-circ');
            circ.setAttribute('data-time', timeLeft);
            circ.style.setProperty('--p', (timeLeft / 60 * 100) + '%');
        }

        function showResults() {
            isTestRunning = false; clearInterval(timer);
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            let score = 0, c = 0, w = 0, s = 0, html = "";
            questions.forEach((q, i) => {
                const ua = userAnswers[i];
                if(ua === q.a) { score += 1; c++; } else if(ua !== -1) { score -= 0.25; w++; } else { s++; }
                html += `<div class="review-card" style="border-left-color: ${ua===-1?'var(--warning)':(ua===q.a?'var(--success)':'var(--error)')}"><b>${i+1}. ${q.q} ${markedReviews[i]?'🔖':''}</b><br><small>Your: ${ua===-1?'Skipped':q.options[ua]} | Correct: ${q.options[q.a]}</small></div>`;
            });
            document.getElementById('final-score').innerText = score.toFixed(2);
            document.getElementById('stat-text').innerHTML = `✅ ${c} | ❌ ${w} | ⏩ ${s}`;
            document.getElementById('review-container').innerHTML = html;
            window.finalVal = score;
        }

        window.submitToFirebase = async () => {
            const btn = document.getElementById('syncBtn');
            btn.innerText = "Saving..."; btn.disabled = true;
            try {
                await addDoc(collection(db, "results"), {
                    name: localStorage.getItem('user'),
                    email: localStorage.getItem('mail'),
                    score: window.finalVal,
                    doubt: document.getElementById('feedback-txt').value || "None",
                    timestamp: serverTimestamp()
                });
                alert("Saved!"); location.reload();
            } catch(e) { alert("Error!"); btn.disabled = false; }
        };
    </script>
</body>
</html>
