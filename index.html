 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Elite | Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text); display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .login-box { 
            background: var(--card); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 28px; width: 100%; max-width: 400px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            text-align: center; animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 0.75rem; color: #818cf8; font-weight: 600; margin-left: 5px; }
        
        input { 
            width: 100%; padding: 14px; margin-top: 5px; border-radius: 12px; border: 1px solid #334155; 
            background: rgba(15, 23, 42, 0.8); color: white; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3); }

        button { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 600;
            font-size: 1rem; margin-top: 15px; transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        button:disabled { background: #475569; cursor: not-allowed; }

        #status-msg { margin-top: 20px; font-size: 0.9rem; min-height: 25px; }
        .err { color: #ef4444; font-weight: 600; }
        .ok { color: #22c55e; }
    </style>
</head>
<body>

<div class="login-box" id="auth-ui">
    <h2 style="margin-bottom:5px;">Physics Elite Portal</h2>
    <p style="color:#94a3b8; font-size:0.85rem; margin-bottom:25px;">Verify your identity to start the test</p>

    <div class="input-group">
        <label>FULL NAME</label>
        <input type="text" id="name" placeholder="Enter your name">
    </div>
    <div class="input-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" id="email" placeholder="student@example.com">
    </div>

    <button id="entryBtn">Verify & Continue</button>
    <div id="status-msg"></div>
</div>

<div class="login-box" id="instruction-ui" style="display:none;">
    <h2 style="color:var(--primary)">Test Instructions</h2>
    <div style="text-align:left; color:#94a3b8; font-size:0.9rem; margin: 20px 0; line-height:1.6;">
        <p>✅ <b>Total Questions:</b> 10</p>
        <p>⏱️ <b>Timer:</b> 30 Seconds per question</p>
        <p>📝 <b>Feedback:</b> Required after submission</p>
        <p>⚠️ <b>Warning:</b> Do not refresh during the test</p>
    </div>
    <button onclick="window.location.href='chapter1.html'">I am Ready, Start Test</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA8XeHrqnYP1FEpwpqUZEdKsVAJGDw2r7o",
        authDomain: "physics-test-series-405c7.firebaseapp.com",
        projectId: "physics-test-series-405c7",
        storageBucket: "physics-test-series-405c7.firebasestorage.app",
        messagingSenderId: "758620061190",
        appId: "1:758620061190:web:dbbc7759c95b5e7d8b8d87"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const btn = document.getElementById('entryBtn');
    const msg = document.getElementById('status-msg');

    btn.addEventListener('click', async () => {
        const nameVal = document.getElementById('name').value.trim();
        const emailVal = document.getElementById('email').value.trim().toLowerCase();

        if (!nameVal || !emailVal) {
            msg.innerHTML = '<span class="err">⚠️ Please enter both Name and Email.</span>';
            return;
        }

        btn.disabled = true;
        msg.innerHTML = '<span style="color:var(--primary)">Verifying with Database...</span>';

        try {
            // Live Firebase Check
            const q = query(collection(db, "results"), where("email", "==", emailVal));
            const snap = await getDocs(q);

            if (!snap.empty) {
                msg.innerHTML = '<span class="err">❌ Access Denied: Test already completed.</span>';
                btn.disabled = false;
            } else {
                localStorage.setItem('currentUser', nameVal);
                localStorage.setItem('currentEmail', emailVal);
                
                // Switch to Instructions Slide
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('instruction-ui').style.display = 'block';
            }
        } catch (error) {
            msg.innerHTML = '<span class="err">Connection Error. Please try again.</span>';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
